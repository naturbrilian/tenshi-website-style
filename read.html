<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading - Lieba Natur Brilian</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* --- 0. TEMA CATPPUCCIN (AUTO DARK/LIGHT MODE) --- */
        :root {
            /* MOCHA (DARK) */
            --bg-color: #1e1e2e;
            --dot-color: #313244;
            --widget-bg: rgba(24, 24, 37, 0.65);
            --widget-border: rgba(255, 255, 255, 0.08);
            --widget-shadow: rgba(17, 17, 27, 0.5);
            --text-main: #cdd6f4;
            --text-muted: #bac2de;
            --accent-primary: #cba6f7;
            --accent-secondary: #f9e2af;
            --code-bg: rgba(17, 17, 27, 0.8);
            --scrollbar-thumb: #cba6f7;
        }

        @media (prefers-color-scheme: light) {
            :root {
                /* LATTE (LIGHT) */
                --bg-color: #eff1f5;
                --dot-color: #dce0e8;
                --widget-bg: rgba(255, 255, 255, 0.55);
                --widget-border: rgba(255, 255, 255, 0.8);
                --widget-shadow: rgba(140, 143, 161, 0.15);
                --text-main: #4c4f69;
                --text-muted: #6c6f85;
                --accent-primary: #8839ef;
                --accent-secondary: #df8e1d;
                --code-bg: rgba(233, 233, 233, 0.8);
                --scrollbar-thumb: #8839ef;
            }
        }

        /* --- 1. SETUP GLOBAL --- */
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--dot-color) 15%, transparent 16%),
                              radial-gradient(var(--dot-color) 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Nunito', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main); overflow: hidden; 
            transition: background-color 0.5s ease;
        }

        .main-stage {
            position: relative; width: 100%; max-width: 1200px; height: 90vh; display: block;
        }

        /* --- 2. STYLE WIDGET --- */
        .widget {
            background: var(--widget-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 15px 25px;
            color: var(--text-muted);
            box-shadow: 0 8px 32px 0 var(--widget-shadow);
            border: 1px solid var(--widget-border);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .mobile-header-wrapper { position: absolute; top: 0; left: 0; width: 100%; z-index: 50; }
        .mobile-menu-toggle { display: none; }

        /* --- 3. NAVIGASI --- */
        .top-nav {
            position: absolute; top: 0; left: 50%; 
            transform: translateX(-50%);
            display: flex; gap: 20px; font-size: 20px; color: var(--accent-primary);
            width: fit-content; align-items: center; z-index: 50;
        }
        .top-nav a { color: inherit; transition: 0.3s; text-decoration: none; }
        .top-nav a:hover, .top-nav i:hover { color: var(--text-main); cursor: pointer; }
        .active-icon { color: var(--text-main); margin-right: 5px; }

        .lang-switcher {
            position: absolute; top: 0; right: 0;
            display: flex; gap: 10px; font-weight: bold; font-size: 14px; z-index: 50;
        }
        .lang-btn { cursor: pointer; padding: 5px 10px; border-radius: 5px; transition: 0.3s; color: var(--text-muted); }
        .lang-btn:hover { color: var(--text-main); }
        .lang-btn.active { background-color: var(--accent-primary); color: var(--bg-color); }

        /* --- 4. CONTAINER ARTIKEL --- */
        .article-container {
            position: absolute; top: 55%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 100%; height: 75vh;
            display: flex; flex-direction: column; padding: 40px;
            overflow-y: auto; 
        }

        .article-container::-webkit-scrollbar { width: 8px; }
        .article-container::-webkit-scrollbar-track { background: transparent; }
        .article-container::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        .back-link {
            display: inline-flex; align-items: center; gap: 5px; 
            text-decoration: none; color: var(--accent-primary); font-weight: bold; font-size: 14px; 
            transition: 0.3s; width: fit-content;
        }
        .back-link:hover { color: var(--text-main); transform: translateX(-5px); }

        /* --- 5. FORMATTING MARKDOWN CATPPUCCIN --- */
        #markdown-content { color: var(--text-main); line-height: 1.8; margin-top: 20px; }
        
        #markdown-content h1 { font-size: 2.2em; color: var(--accent-primary); border-bottom: 2px solid var(--widget-border); padding-bottom: 10px; margin-top: 0; font-weight: 900; }
        #markdown-content h2 { font-size: 1.8em; color: var(--accent-primary); margin-top: 30px; margin-bottom: 15px; }
        #markdown-content h3 { font-size: 1.4em; color: var(--text-main); margin-top: 25px; margin-bottom: 10px; }
        
        #markdown-content p { font-size: 1.1em; margin-bottom: 20px; text-align: justify; }
        #markdown-content strong { color: var(--text-main); font-weight: 900; }
        #markdown-content em { color: var(--accent-secondary); font-style: italic; }
        
        #markdown-content a { color: var(--accent-primary); text-decoration: none; border-bottom: 1px dashed var(--accent-primary); transition: 0.3s; }
        #markdown-content a:hover { color: var(--text-main); border-bottom: 1px solid var(--text-main); }
        
        #markdown-content ul, #markdown-content ol { padding-left: 25px; margin-bottom: 20px; }
        #markdown-content li::marker { color: var(--accent-primary); font-weight: bold; }
        
        #markdown-content img { max-width: 100%; border-radius: 10px; margin: 20px 0; border: 1px solid var(--widget-border); box-shadow: 0 5px 15px var(--widget-shadow); }
        
        #markdown-content blockquote { 
            border-left: 5px solid var(--accent-primary); padding: 15px 20px; margin: 25px 0; 
            background: var(--sidebar-bg); color: var(--text-muted); font-style: italic; border-radius: 0 10px 10px 0; 
        }
        
        #markdown-content pre { 
            background: var(--code-bg); padding: 15px; border-radius: 10px; overflow-x: auto; margin-bottom: 25px; border: 1px solid var(--widget-border); 
        }
        #markdown-content pre code { background: transparent; padding: 0; color: var(--text-main); font-family: 'Consolas', monospace; }
        
        #markdown-content code { 
            background: var(--widget-border); padding: 2px 6px; border-radius: 5px; color: var(--accent-secondary); font-family: 'Consolas', monospace; font-size: 0.9em; 
        }
        
        #markdown-content table { width: 100%; border-collapse: collapse; margin: 25px 0; overflow: hidden; border-radius: 10px; }
        #markdown-content th, #markdown-content td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--widget-border); }
        #markdown-content th { background-color: var(--widget-bg); color: var(--text-main); font-weight: bold; }

        /* --- 6. RESPONSIF MOBILE --- */
        @media (max-width: 768px) {
            body { overflow-y: auto; padding: 20px 0 50px 0; display: block; }
            .main-stage { height: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; padding-bottom: 50px; }
            .widget { position: relative !important; top: auto !important; left: auto !important; transform: none !important; width: 90% !important; margin: 0 auto; }
            .mobile-header-wrapper { position: relative !important; display: flex; width: 90% !important; justify-content: space-between; gap: 10px; order: 1; }
            .mobile-header-wrapper .widget { width: auto !important; margin: 0 !important; }
            .mobile-menu-toggle { display: flex !important; flex-grow: 1; justify-content: center; align-items: center; gap: 10px; padding: 12px; color: var(--text-main); font-weight: bold; }
            .lang-switcher { flex-grow: 0; padding: 10px 15px; }
            .top-nav { order: 2; display: none !important; flex-direction: column; padding: 10px 20px !important; margin-top: -5px; }
            .top-nav.open { display: flex !important; }
            .top-nav a, .top-nav div { width: 100%; display: flex; justify-content: center; padding: 12px 0; border-bottom: 1px solid var(--widget-border); }
            .article-container { order: 3; padding: 25px !important; height: auto !important; overflow: visible !important; }
        }
    </style>
</head>    
<body>
    <div class="main-stage">
        <div class="mobile-header-wrapper">
            <div class="widget mobile-menu-toggle" onclick="toggleNav()">
                <i class="fas fa-bars"></i> <span data-key="nav_menu">Menu</span>
            </div>
            <div class="widget lang-switcher">
                <span class="lang-btn active" onclick="setLanguage('en')">EN</span>
                <span class="lang-btn" onclick="setLanguage('id')">ID</span>
                <span class="lang-btn" onclick="setLanguage('ja')">JP</span>
            </div>
        </div>

        <div class="widget top-nav" id="myTopNav">
            <a href="index.html"><i class="fas fa-home"></i></a>
            <a href="about.html"><i class="far fa-user"></i></a>
            <a href="cv.html"><i class="fa-brands fa-wpforms"></i></a>
            <div><a href="blog.html"><i class="fas fa-edit active-icon"></i></a></div> 
            <a href="gallery.html"><i class="far fa-images"></i></a>
            <i class="fas fa-cog"></i>
        </div>

        <div class="widget article-container">
            <a href="blog.html" class="back-link">
                <i class="fas fa-chevron-left"></i> <span data-key="btn_back">Back to Blog</span>
            </a>
            <div id="markdown-content">
                <p style="margin-top: 20px; color: var(--text-muted);" data-key="loading_msg">Loading article...</p>
            </div>
        </div>
    </div>

<script>
    const uiData = {
        en: { nav_menu: "Menu", btn_back: "Back to Blog", loading_msg: "Loading article...", error_msg: "Article not found or not available in this language." },
        id: { nav_menu: "Menu", btn_back: "Kembali ke Blog", loading_msg: "Memuat artikel...", error_msg: "Artikel tidak ditemukan atau belum tersedia dalam bahasa ini." },
        ja: { nav_menu: "メニュー", btn_back: "ブログに戻る", loading_msg: "記事を読み込んでいます...", error_msg: "記事が見つからないか、この言語では利用できません。" }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const fileName = urlParams.get('file');

    function setLanguage(lang) {
        const texts = uiData[lang];
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if (texts[key]) el.innerText = texts[key];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.innerText.toLowerCase() === (lang === 'ja' ? 'jp' : lang)) btn.classList.add('active');
        });
        loadMarkdown(lang);
    }

    function toggleNav() { document.getElementById("myTopNav").classList.toggle("open"); }

    function loadMarkdown(lang) {
        const contentDiv = document.getElementById('markdown-content');
        if (!fileName) { contentDiv.innerHTML = "<h2>Error: No file specified.</h2>"; return; }
        const filePath = `posts/${lang}/${fileName}`;

        fetch(filePath)
            .then(response => { if (!response.ok) throw new Error(); return response.text(); })
            .then(text => {
                const cleanText = text.replace(/^\s*---[\s\S]*?---\s*/, '');
                contentDiv.innerHTML = marked.parse(cleanText);
                const titleMatch = cleanText.match(/^#\s+(.*)/m);
                document.title = (titleMatch ? titleMatch[1] : "Reading") + " - Lieba Natur Brilian";
            })
            .catch(() => {
                contentDiv.innerHTML = `<div style="text-align:center; padding: 40px; color: #f38ba8;"><i class="fas fa-exclamation-triangle" style="font-size: 40px; margin-bottom: 15px;"></i><h3>Oops!</h3><p>${uiData[lang].error_msg}</p><small style="opacity: 0.5;">Path: ${filePath}</small></div>`;
            });
    }
    setLanguage('en');
</script>
</body>
</html>
