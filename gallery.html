<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Lieba Natur Brilian</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- 1. SETUP GLOBAL --- */
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            background-color: #6c5ce7;
            background-image: radial-gradient(#8c7ae6 15%, transparent 16%),
                              radial-gradient(#8c7ae6 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Nunito', 'Noto Sans JP', sans-serif;
            
            /* DESKTOP: Matikan scroll window */
            min-height: 100vh;
            overflow: hidden; 
            
            display: flex; justify-content: center; align-items: center;
            color: white; 
        }

        .main-stage {
            position: relative; width: 100%; max-width: 1200px; height: 90vh; display: block;
        }

        /* --- 2. WIDGET STYLE --- */
        .widget {
            background: rgba(45, 52, 117, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            color: #a4b0be;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            z-index: 10;
            transition: all 0.3s ease;
        }

        /* Wrapper Khusus Header Mobile */
        .mobile-header-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 50;
        }

        /* Tombol Menu HP */
        .mobile-menu-toggle { display: none; }

        /* --- 3. NAVIGASI & BAHASA (Desktop) --- */
        .top-nav {
            position: absolute; top: 0; left: 50%; 
            transform: translateX(-50%);
            display: flex; gap: 20px; font-size: 20px; color: #8c7ae6;
            width: fit-content; align-items: center; z-index: 50;
        }
        .top-nav a { color: #8c7ae6; transition: 0.3s; }
        .top-nav a:hover, .top-nav i:hover { color: white; cursor: pointer; }
        .active-icon { color: white; margin-right: 5px; }

        .lang-switcher {
            position: absolute; top: 0; right: 0;
            display: flex; gap: 10px; font-weight: bold; font-size: 14px; z-index: 50;
        }
        .lang-btn {
            cursor: pointer; padding: 5px 10px; border-radius: 5px; transition: 0.3s;
        }
        .lang-btn:hover, .lang-btn.active { background-color: #8c7ae6; color: white; }

        /* --- 4. LAYOUT GALERI (GRID SYSTEM) --- */
        .gallery-container {
            position: absolute;
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 1190px;
            height: 65vh; 
            display: flex; flex-direction: column; padding: 30px; overflow: hidden;
        }

        .gallery-header { margin-bottom: 20px; text-align: center; }
        .gallery-header h2 { margin: 0; font-size: 28px; color: #a29bfe; }

        .gallery-scroll-area { overflow-y: auto; padding-right: 10px; height: 100%; }
        .gallery-scroll-area::-webkit-scrollbar { width: 8px; }
        .gallery-scroll-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .gallery-scroll-area::-webkit-scrollbar-thumb { background: #8c7ae6; border-radius: 10px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .gallery-card {
            background: rgba(0, 0, 0, 0.2); border-radius: 10px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .gallery-card:hover { background: rgba(0, 0, 0, 0.4); transform: translateY(-5px); }

        .g-img {
            width: 100%; height: 180px; object-fit: cover; border-radius: 8px;
            margin-bottom: 10px; background: #333;
        }

        .g-info { display: flex; justify-content: space-between; align-items: center; }
        .g-title { font-size: 14px; font-weight: bold; color: #dfe6e9; }
        
        .dl-btn {
            background: #8c7ae6; color: white; text-decoration: none; padding: 5px 12px;
            border-radius: 5px; font-size: 12px; transition: 0.3s;
        }
        .dl-btn:hover { background: #a29bfe; }


        /* --- 5. RESPONSIF MOBILE --- */
        @media (max-width: 1100px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); } /* Jadi 2 kolom di tablet */
        }

        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; display: block; padding: 20px 0 50px 0; }
            .main-stage { height: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; padding-bottom: 50px; overflow: visible; }
            
            .widget {
                position: relative !important; top: auto !important; left: auto !important; right: auto !important; bottom: auto !important;
                transform: none !important; width: 90% !important; max-width: 100%; margin: 0 auto;
            }

            /* 1. Header Mobile Berjejer */
            .mobile-header-wrapper {
                position: relative !important; display: flex; width: 90% !important;
                justify-content: space-between; gap: 10px; order: 1; z-index: 50;
            }
            .mobile-header-wrapper .widget { width: auto !important; margin: 0 !important; }
            .mobile-menu-toggle {
                display: flex !important; flex-grow: 1; justify-content: center; align-items: center; gap: 10px;
                padding: 12px; cursor: pointer; font-weight: bold; font-size: 16px; color: white;
            }
            .lang-switcher { flex-grow: 0; padding: 10px 15px; align-items: center; justify-content: center; }

            /* 2. Navigasi Dropdown */
            .top-nav { 
                order: 2; display: none !important; 
                flex-direction: column; padding: 10px 20px !important; margin-top: -5px;
            }
            .top-nav.open { display: flex !important; }
            .top-nav a, .top-nav div, .top-nav i.fa-cog {
                width: 100%; display: flex; justify-content: center; padding: 12px 0;
                border-bottom: 1px solid rgba(255,255,255,0.1); margin: 0;
            }
            .top-nav > *:last-child { border-bottom: none; }
            
            /* 3. Konten Galeri */
            .gallery-container {
                order: 3; height: auto !important; max-height: none; overflow: visible !important;
                padding: 20px !important;
            }
            .gallery-scroll-area { overflow: visible !important; height: auto !important; }
            .gallery-grid { grid-template-columns: 1fr; } /* 1 kolom di HP */
        }
    </style>
</head>    
<body>

<script>
    const translations = {
        en: {
            nav_gallery: "Gallery",
            nav_menu: "Menu", /* Tambahan untuk Mobile Menu */
            gallery_title: "Gallery"
        },
        id: {
            nav_gallery: "Galeri",
            nav_menu: "Menu",
            gallery_title: "Galeri"
        },
        ja: {
            nav_gallery: "ギャラリー",
            nav_menu: "メニュー",
            gallery_title: "ギャラリー"
        }
    };

    function setLanguage(lang) {
        const data = translations[lang];
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if(data[key]) el.innerText = data[key];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase() === (lang === 'ja' ? 'jp' : lang)) {
                btn.classList.add('active');
            }
        });
    }

    function toggleNav() {
        const nav = document.getElementById("myTopNav");
        nav.classList.toggle("open");
    }

    setLanguage('en'); 
</script>
