<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Lieba Natur Brilian</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- 0. TEMA CATPPUCCIN (AUTO DARK/LIGHT MODE) --- */
        :root {
            /* CATPPUCCIN MOCHA (MODE GELAP - DEFAULT) */
            --bg-color: #1e1e2e;
            --dot-color: #313244;
            --widget-bg: rgba(24, 24, 37, 0.65);
            --widget-border: rgba(255, 255, 255, 0.08);
            --widget-shadow: rgba(17, 17, 27, 0.5);
            --text-main: #cdd6f4;
            --text-muted: #bac2de;
            --accent-primary: #cba6f7;
            --accent-secondary: #a6e3a1;
            --card-bg: rgba(17, 17, 27, 0.3);
            --scrollbar-thumb: #cba6f7;
        }

        @media (prefers-color-scheme: light) {
            :root {
                /* CATPPUCCIN LATTE (MODE TERANG) */
                --bg-color: #eff1f5;
                --dot-color: #dce0e8;
                --widget-bg: rgba(255, 255, 255, 0.55);
                --widget-border: rgba(255, 255, 255, 0.8);
                --widget-shadow: rgba(140, 143, 161, 0.15);
                --text-main: #4c4f69;
                --text-muted: #6c6f85;
                --accent-primary: #8839ef;
                --accent-secondary: #40a02b;
                --card-bg: rgba(255, 255, 255, 0.4);
                --scrollbar-thumb: #8839ef;
            }
        }

        /* --- 1. SETUP GLOBAL --- */
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(var(--dot-color) 15%, transparent 16%),
                              radial-gradient(var(--dot-color) 15%, transparent 16%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Nunito', 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            color: var(--text-main); 
            transition: background-color 0.5s ease;
        }

        .main-stage {
            position: relative; width: 100%; max-width: 1200px; height: 90vh; display: block;
        }

        /* --- 2. STYLE WIDGET --- */
        .widget {
            background: var(--widget-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 15px 25px;
            color: var(--text-muted);
            box-shadow: 0 8px 32px 0 var(--widget-shadow);
            border: 1px solid var(--widget-border);
            z-index: 10;
            transition: all 0.3s ease;
        }

        .mobile-header-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 50;
        }
        .mobile-menu-toggle { display: none; }

        /* --- 3. NAVIGASI --- */
        .top-nav {
            position: absolute; top: 0; left: 50%; 
            transform: translateX(-50%);
            display: flex; gap: 20px; font-size: 20px; color: var(--accent-primary);
            width: fit-content; align-items: center; z-index: 50;
        }
        .top-nav a { color: inherit; text-decoration: none; transition: 0.3s; }
        .top-nav a:hover, .top-nav i:hover { color: var(--text-main); cursor: pointer; }
        .active-icon { color: var(--text-main); margin-right: 5px; }

        .lang-switcher {
            position: absolute; top: 0; right: 0;
            display: flex; gap: 10px; font-weight: bold; font-size: 14px; z-index: 50;
        }
        .lang-btn {
            cursor: pointer; padding: 5px 10px; border-radius: 5px; transition: 0.3s; color: var(--text-muted);
        }
        .lang-btn:hover { color: var(--text-main); }
        .lang-btn.active { background-color: var(--accent-primary); color: var(--bg-color); }

        /* --- 4. LAYOUT GALERI --- */
        .gallery-container {
            position: absolute;
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            width: 1190px;
            height: 65vh; 
            display: flex; flex-direction: column; padding: 30px; overflow: hidden;
        }

        .gallery-header { margin-bottom: 20px; text-align: center; }
        .gallery-header h2 { margin: 0; font-size: 28px; color: var(--accent-primary); font-weight: 900; }

        .gallery-scroll-area { overflow-y: auto; padding-right: 10px; height: 100%; }
        .gallery-scroll-area::-webkit-scrollbar { width: 8px; }
        .gallery-scroll-area::-webkit-scrollbar-track { background: transparent; }
        .gallery-scroll-area::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

        .gallery-card {
            background: var(--card-bg); border-radius: 10px; padding: 10px;
            border: 1px solid var(--widget-border); transition: 0.3s;
        }
        .gallery-card:hover { background: var(--widget-bg); transform: translateY(-5px); }

        .g-img {
            width: 100%; height: 180px; object-fit: cover; border-radius: 8px;
            margin-bottom: 10px; background: var(--dot-color);
        }

        .g-info { display: flex; justify-content: space-between; align-items: center; }
        .g-title { font-size: 14px; font-weight: bold; color: var(--text-main); }
        
        .dl-btn {
            background: var(--accent-primary); color: var(--bg-color); text-decoration: none; padding: 5px 12px;
            border-radius: 5px; font-size: 12px; transition: 0.3s;
        }
        .dl-btn:hover { opacity: 0.8; }


        /* --- 5. RESPONSIF MOBILE --- */
        @media (max-width: 1100px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; display: block; padding: 20px 0 50px 0; }
            .main-stage { height: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; padding-bottom: 50px; }
            
            .widget {
                position: relative !important; top: auto !important; left: auto !important; transform: none !important; width: 90% !important; margin: 0 auto;
            }

            .mobile-header-wrapper {
                position: relative !important; display: flex; width: 90% !important;
                justify-content: space-between; gap: 10px; order: 1;
            }
            .mobile-header-wrapper .widget { width: auto !important; margin: 0 !important; }
            .mobile-menu-toggle {
                display: flex !important; flex-grow: 1; justify-content: center; align-items: center; gap: 10px;
                padding: 12px; color: var(--text-main); font-weight: bold; font-size: 16px;
            }
            .lang-switcher { flex-grow: 0; padding: 10px 15px; }

            .top-nav { 
                order: 2; display: none !important; 
                flex-direction: column; padding: 10px 20px !important; margin-top: -5px;
            }
            .top-nav.open { display: flex !important; }
            .top-nav a, .top-nav div {
                width: 100%; display: flex; justify-content: center; padding: 12px 0;
                border-bottom: 1px solid var(--widget-border); margin: 0;
            }
            .top-nav > *:last-child { border-bottom: none; }
            
            .gallery-container {
                order: 3; height: auto !important; overflow: visible !important;
                padding: 20px !important;
            }
            .gallery-scroll-area { overflow: visible !important; height: auto !important; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>    
<body>

<script>
    const translations = {
        en: { nav_gallery: "Gallery", nav_menu: "Menu", gallery_title: "Gallery" },
        id: { nav_gallery: "Galeri", nav_menu: "Menu", gallery_title: "Galeri" },
        ja: { nav_gallery: "ギャラリー", nav_menu: "メニュー", gallery_title: "ギャラリー" }
    };

    function setLanguage(lang) {
        const data = translations[lang];
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if(data[key]) el.innerText = data[key];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase() === (lang === 'ja' ? 'jp' : lang)) {
                btn.classList.add('active');
            }
        });
    }

    function toggleNav() { document.getElementById("myTopNav").classList.toggle("open"); }
    setLanguage('en'); 
</script>
