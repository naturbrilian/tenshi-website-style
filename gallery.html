<script>
    const translations = {
        en: { nav_gallery: "Gallery", nav_menu: "Menu", gallery_title: "Gallery" },
        id: { nav_gallery: "Galeri", nav_menu: "Menu", gallery_title: "Galeri" },
        ja: { nav_gallery: "ギャラリー", nav_menu: "メニュー", gallery_title: "ギャラリー" }
    };

    function setLanguage(lang) {
        const data = translations[lang];
        document.querySelectorAll('[data-key]').forEach(el => {
            const key = el.getAttribute('data-key');
            if(data[key]) el.innerText = data[key];
        });
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.remove('active');
            if(btn.innerText.toLowerCase() === (lang === 'ja' ? 'jp' : lang)) {
                btn.classList.add('active');
            }
        });
    }

    function toggleNav() { document.getElementById("myTopNav").classList.toggle("open"); }
    setLanguage('en'); 
</script>
